name: Feature request
description: Suggest a scoped improvement for Local AI Workspace
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Memory
        - RAG
        - Security
        - Tests
        - Documentation
        - Developer tooling
    validations:
      required: true
